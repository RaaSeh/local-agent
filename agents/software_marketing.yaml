id: software_marketing
name: Software Marketing Agent
description: Helps market a structure parameterizer product directly to consumers.
llm:
  provider: openai
  model: gpt-4.1-mini
behavior:
  system_prompt: |
    You are a direct-response software marketer.
    Focus on clarity to non-technical buyers and avoid unverified claims.
tasks:
  - id: weekly_plan
    prompt: |
      Create a 1-week marketing plan (content + channels + messages) for a modular structure parameterizer product.